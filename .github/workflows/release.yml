name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Android project
        run: npm run tauri:android:init

      - name: Build Android APK
        run: npm run tauri:android:build

      - name: Collect APK assets
        run: |
          mkdir -p release-assets
          find src-tauri/gen/android -type f -name "*.apk" -print -exec cp {} release-assets/ \;
          if [ -z "$(ls -A release-assets)" ]; then
            echo "No APK files were generated."
            exit 1
          fi
          ls -lah release-assets

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: lynx-studio-android-${{ env.RELEASE_TAG }}
          path: release-assets/*.apk

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "Lynx Studio $RELEASE_TAG" \
              --notes "Lynx Studio mobile release.\n\nBaixe o APK nos assets desta release."
          fi
          gh release upload "$RELEASE_TAG" release-assets/*.apk --clobber
