name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.3'
        required: true
        default: 'v0.1.3'

permissions:
  contents: write

jobs:
  android:
    name: Android APK/AAB
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Android project
        run: npm run tauri:android:init

      - name: Apply Android identity
        run: node scripts/patch-android-identity.mjs

      - name: Apply Android runtime patches
        run: node scripts/patch-android-runtime.mjs

      - name: Prepare Android signing
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_BASE64" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Android signing secrets are missing."
            exit 1
          fi

          cd src-tauri/gen/android
          echo "keyAlias=$ANDROID_KEY_ALIAS" > keystore.properties
          echo "password=$ANDROID_KEY_PASSWORD" >> keystore.properties
          echo "$ANDROID_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/lynx-studio-release.jks"
          echo "storeFile=$RUNNER_TEMP/lynx-studio-release.jks" >> keystore.properties

          cd "$GITHUB_WORKSPACE"
          node scripts/patch-android-signing.mjs

      - name: Build Android APK
        run: npm run tauri:android:build

      - name: Build Android AAB
        run: npm run tauri:android:build:aab

      - name: Collect Android assets
        run: |
          mkdir -p release-assets
          APK_PATH="$(find src-tauri/gen/android -type f -name "*release*.apk" | sort | head -n 1)"
          AAB_PATH="$(find src-tauri/gen/android -type f -name "*release*.aab" | sort | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            APK_PATH="$(find src-tauri/gen/android -type f -name "*.apk" | sort | head -n 1)"
          fi
          if [ -z "$AAB_PATH" ]; then
            AAB_PATH="$(find src-tauri/gen/android -type f -name "*.aab" | sort | head -n 1)"
          fi
          if [ -z "$APK_PATH" ] && [ -z "$AAB_PATH" ]; then
            echo "No Android release assets were generated."
            exit 1
          fi
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "release-assets/Lynx-Studio-${RELEASE_TAG}.apk"
          fi
          if [ -n "$AAB_PATH" ]; then
            cp "$AAB_PATH" "release-assets/Lynx-Studio-${RELEASE_TAG}.aab"
          fi
          ls -lah release-assets

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: lynx-studio-android-${{ env.RELEASE_TAG }}
          path: release-assets/*

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release-notes.md <<'EOF'
          APK Android assinado e AAB para loja.

          Esta release inclui:
          - layout Android em tela cheia, sem frame interno;
          - status bar fake removida no dispositivo;
          - safe area e teclado virtual tratados no layout;
          - file picker nativo para abrir pastas;
          - APK instalavel e AAB assinado nos assets.
          EOF

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "Lynx Studio $RELEASE_TAG" \
              --notes-file release-notes.md
          fi
          gh release upload "$RELEASE_TAG" release-assets/* --clobber
